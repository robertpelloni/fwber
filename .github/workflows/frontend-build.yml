name: Frontend Build & Deploy (Vercel)

on:
  push:
    paths:
      - 'fwber-frontend/**'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    paths:
      - 'fwber-frontend/**'
  workflow_dispatch:

jobs:
  build:
    name: Next.js Production Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./fwber-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: fwber-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Test Build (TypeScript / ESLint / Next.js)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.fwber.me
          NEXT_PUBLIC_REVERB_HOST: ws.fwber.me
          NEXT_PUBLIC_REVERB_PORT: 443
          NEXT_PUBLIC_REVERB_SCHEME: https
