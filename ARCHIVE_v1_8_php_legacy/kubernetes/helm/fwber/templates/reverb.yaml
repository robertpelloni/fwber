apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fwber.fullname" . }}-reverb
  labels:
    {{- include "fwber.labels" . | nindent 4 }}
    app.kubernetes.io/component: reverb
spec:
  replicas: {{ .Values.reverb.replicaCount }}
  selector:
    matchLabels:
      {{- include "fwber.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: reverb
  template:
    metadata:
      labels:
        {{- include "fwber.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: reverb
    spec:
      containers:
        - name: reverb
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["php", "artisan", "reverb:start"]
          ports:
            - name: ws
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV | quote }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fwber.fullname" . }}-reverb
  labels:
    {{- include "fwber.labels" . | nindent 4 }}
    app.kubernetes.io/component: reverb
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: ws
      protocol: TCP
      name: ws
  selector:
    {{- include "fwber.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: reverb
