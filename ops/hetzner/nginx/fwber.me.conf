server {
    listen 80;
    listen [::]:80;
    server_name fwber.me www.fwber.me;
    return 301 https://www.fwber.me$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fwber.me;
    return 301 https://www.fwber.me$request_uri;

    ssl_certificate /etc/letsencrypt/live/fwber.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fwber.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.fwber.me;
    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/fwber.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fwber.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets (Next.js _next)
    location /_next/static/ {
        alias /var/www/fwber/repo/fwber-frontend/.next/standalone/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # User uploads (symlinked from backend)
    location /uploads/ {
        alias /var/www/fwber/repo/fwber-backend-ts/uploads/;
        expires 30d;
    }

    # API proxy (same machine — sub-millisecond latency!)
    location /api/ {
        proxy_pass http://127.0.0.1:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Everything else → Next.js standalone server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
