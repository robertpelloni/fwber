server {
    listen 80;
    listen [::]:80;
    server_name mercure.fwber.me;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mercure.fwber.me;

    # Mercure is not part of the active production contract anymore.
    # Keep the hostname explicit so requests fail honestly with a stable
    # response instead of proxying to a dead upstream and returning a noisy 502.
    ssl_certificate /etc/letsencrypt/live/ws.fwber.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ws.fwber.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /.well-known/mercure {
        default_type text/plain;
        return 410 "mercure.fwber.me is retired; use the Reverb websocket stack on ws.fwber.me instead.\n";
    }

    location / {
        default_type text/plain;
        return 410 "mercure.fwber.me is retired; no Mercure hub is active in production.\n";
    }
}
